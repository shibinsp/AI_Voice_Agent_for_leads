services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: sqlite:////data/ai_voice.db
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000/api/v1}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
